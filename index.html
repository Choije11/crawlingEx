<!DOCTYPE html>
<html lang="ko">
<head>

    <main class="container">
        <section class="ranking-section">

                <!-- script.js에서 제품 리스트를 생성합니다 -->
            </div>
        </section>

        <nav class="pagination">
            <ul id="pagination-list">
                <!-- 페이지 번호가 생성됩니다 -->
            </ul>
        </nav>
    </main>

    <footer>
        <p>&copy; 2026 Crawling Practice Page. All rights reserved.</p>
